logging:
  console:
    # For a MCP stdio server, we don't want to log to the console, See https://modelcontextprotocol.io/docs/develop/build-server#logging-in-mcp-servers-3
    enabled: false
  file:
    name: mcp-weather-stdio-server.log
    
spring:
  application:
    name: weathermcp
  main:
    # For a MCP stdio server, we don't want to log to the console, See https://modelcontextprotocol.io/docs/develop/build-server#logging-in-mcp-servers-3
    banner-mode: off
  ai:
    mcp:
      server:
        name: weathermcp
        version: ${APP_VERSION:0.0.1-SNAPSHOT}
        instructions: "This server provides weather information."
        type: SYNC
        stdio: true
        tool-callback-converter: false
        capabilities:
          completion: true
          resource: false
          tool: true
          prompt: true

  http:
    serviceclient:
      accuweather:
        base-url: https://dataservice.accuweather.com
        default-header:
          Accept-Encoding: gzip,deflate
          Authorization: Bearer ${ACCUWEATHER_API_KEY}