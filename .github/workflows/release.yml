name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/gradle-build.yml
    with:
      app-version: ${{ github.event.release.tag_name || github.ref_name }}
    secrets: inherit

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder for Docker/MCP registry publishing
        run: 'echo "TODO: Publish Docker image or MCP package for this release"'

