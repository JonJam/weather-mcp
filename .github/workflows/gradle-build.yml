name: Gradle Build

on:
  workflow_call:
    inputs:
      app-version:
        description: 'Application version to use for APP_VERSION'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set APP_VERSION env (if provided)
        if: ${{ inputs.app-version != '' }}
        run: echo "APP_VERSION=${{ inputs.app-version }}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: ./gradlew build

      - name: Archive built JAR
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: |
            build/libs/*.jar

      - name: Archive Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: |
            build/reports/checkstyle

      - name: Archive JUnit test results and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Archive JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            build/reports/jacoco/test

